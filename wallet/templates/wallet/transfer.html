<!DOCTYPE html>
<html>
<head>
    <title>ApexPay - Transfer</title>
    <style>
        .message { padding: 15px; margin-bottom: 20px; border-radius: 4px; border: 1px solid transparent; }
        .success { color: #155724; background-color: #d4edda; border-color: #c3e6cb; }
        .error { color: #721c24; background-color: #f8d7da; border-color: #f5c6cb; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input { padding: 8px; width: 200px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 10px 20px; background-color: #3498db; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background-color: #2980b9; }
    </style>
</head>
<body>
    <h1>ApexPay: Send Money</h1>

    {% if messages %}
        {% for message in messages %}
            <div class="message {{ message.tags }}">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}

    <form method="POST">
        {% csrf_token %}
        
        <div class="form-group">
            <label>Receiver Account ID:</label>
            <input type="number" name="receiver_id" placeholder="Enter ID (e.g. 2)" required>
        </div>
        
        <div class="form-group">
            <label>Amount ($):</label>
            <input type="number" step="0.01" name="amount" placeholder="0.00" required>
        </div>
        
        <button type="submit">Confirm Transfer</button>
    </form>

    <p><a href="{% url 'dashboard' %}">← Back to Dashboard</a></p>
</body>
</html>
